<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Alex - Intelligent Property Search</title>
    <!-- 引入专业英文字体 Plus Jakarta Sans 和中文字体备选 -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* --- 企业级配色系统 (保持原有红色主调，但优化了中性色) --- */
            --primary-color: #dc2626;
            --primary-hover: #b91c1c;
            --primary-active: #991b1b;
            --primary-light: #fef2f2;
            --primary-fade: rgba(220, 38, 38, 0.06);
            
            /* 中性色 - Cool Grays for Professional Look */
            --text-main: #1f2937;      /* 更深的灰，比纯黑柔和 */
            --text-secondary: #6b7280; /* 次级文本 */
            --text-tertiary: #9ca3af;  /* 占位符或禁用态 */
            
            --bg-body: #f3f4f6;        /* 浅灰背景 */
            --bg-surface: #ffffff;     /* 纯白卡片背景 */
            --bg-hover: #f9fafb;       /* 悬停背景 */
            
            --border-light: #f3f4f6;
            --border-medium: #e5e7eb;
            --border-dark: #d1d5db;
            
            /* --- 阴影系统 (更弥散、高端) --- */
            --shadow-xs: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow-sm: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
            --shadow-focus: 0 0 0 3px var(--primary-fade);

            /* --- 倒角 (稍微减小，更商务) --- */
            --radius-sm: 6px;
            --radius-md: 8px;
            --radius-lg: 12px;
            --radius-full: 9999px;
            
            /* --- 动画 --- */
            --transition-base: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            /* FIX: 优化了字体栈顺序。
               将 "Apple Color Emoji", "Segoe UI Emoji" 等表情符号字体放在中文字体之前。
               这样浏览器遇到 Emoji 字符时，会优先使用系统的彩色 Emoji 字体，而不是中文字体里的黑白字符。
            */
            font-family: 'Plus Jakarta Sans', 'Apple Color Emoji', 'Segoe UI Emoji', 'Segoe UI Symbol', 'Noto Color Emoji', -apple-system, "PingFang SC", "Microsoft YaHei", BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-size: 14px; /* 基础字号微调 */
            line-height: 1.5;
        }

        /* --- ICON SVG STYLES --- */
        .icon {
            width: 18px;
            height: 18px;
            stroke: currentColor;
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
            display: inline-block;
            flex-shrink: 0;
        }
        .icon-sm { width: 14px; height: 14px; }
        .icon-lg { width: 24px; height: 24px; }

        /* --- 顶部导航 (Navbar) --- */
        .navbar {
            background: var(--bg-surface);
            border-bottom: 1px solid var(--border-medium);
            padding: 0 24px;
            height: 60px; /* 稍微压低高度 */
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
            z-index: 50;
        }

        .brand {
            font-size: 1.125rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
        }

        .brand-logo-bg {
            width: 32px;
            height: 32px;
            background: var(--primary-light);
            border-radius: var(--radius-md);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary-color);
        }

        .lang-switch {
            display: flex;
            background: var(--bg-body);
            padding: 3px;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-medium);
        }

        .lang-btn {
            padding: 4px 10px;
            font-size: 12px;
            font-weight: 600;
            border-radius: var(--radius-sm);
            border: none;
            background: transparent;
            color: var(--text-secondary);
            cursor: pointer;
            transition: var(--transition-base);
        }

        .lang-btn.active {
            background: var(--bg-surface);
            color: var(--text-main);
            box-shadow: var(--shadow-xs);
        }

        /* --- 主布局 (Layout) --- */
        .main-container {
            display: flex;
            flex: 1;
            height: calc(100vh - 60px);
            max-width: 1920px;
            margin: 0 auto;
            width: 100%;
            background: var(--border-medium); /* 分隔线 */
            gap: 1px;
        }
        
        /* --- 左侧聊天面板 (Chat Panel) --- */
        .chat-panel {
            flex: 0 0 420px;
            background: var(--bg-surface);
            display: flex;
            flex-direction: column;
            height: 100%;
            position: relative;
            z-index: 10;
        }
        
        .chat-header {
            padding: 16px 24px;
            border-bottom: 1px solid var(--border-medium);
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(8px);
        }
        
        .chat-header h1 {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-main);
            display: flex; align-items: center; gap: 8px;
            margin-bottom: 2px;
        }
        .chat-header p { font-size: 0.8rem; color: var(--text-secondary); }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            display: flex;
            flex-direction: column;
            gap: 20px;
            background: #ffffff;
            scroll-behavior: smooth;
        }
        
        /* 消息气泡 - 专业化 */
        .message {
            max-width: 100%;
            animation: fadeIn 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .message.user { align-items: flex-end; }
        .message.alex { align-items: flex-start; }
        
        .message .sender {
            font-size: 11px;
            color: var(--text-tertiary);
            margin-bottom: 6px;
            margin-left: 2px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: flex; align-items: center; gap: 4px;
        }

        .message .bubble {
            max-width: 90%;
            padding: 12px 16px;
            border-radius: var(--radius-lg);
            font-size: 0.925rem;
            line-height: 1.6;
            position: relative;
            box-shadow: var(--shadow-sm);
            word-wrap: break-word;
        }

        /* Alex's Bubble (Light Gray) */
        .message.alex .bubble {
            background: var(--bg-body);
            color: var(--text-main);
            border-top-left-radius: 2px;
        }

        /* User's Bubble (Primary Red) */
        .message.user .bubble {
            background: var(--primary-color);
            color: white;
            border-top-right-radius: 2px;
            white-space: pre-wrap; 
        }

        /* Markdown Styles within Bubbles */
        .message.alex .bubble h2,
        .message.alex .bubble h3,
        .message.alex .bubble h4 {
            margin: 10px 0 6px 0;
            font-weight: 600;
            line-height: 1.3;
            color: #111;
        }
        .message.alex .bubble ul, 
        .message.alex .bubble ol { margin: 6px 0; padding-left: 20px; }
        .message.alex .bubble li { margin-bottom: 4px; }
        .message.alex .bubble p { margin-bottom: 8px; }
        .message.alex .bubble p:last-child { margin-bottom: 0; }
        .message.alex .bubble strong { color: #000; font-weight: 600; }
        .message.alex .bubble a { color: var(--primary-color); text-decoration: none; border-bottom: 1px solid transparent; }
        .message.alex .bubble a:hover { border-bottom-color: var(--primary-color); }
        
        /* 表格样式 */
        .message.alex .bubble table {
            width: 100%;
            border-collapse: collapse;
            margin: 12px 0;
            font-size: 0.9rem;
        }
        .message.alex .bubble table thead {
            background: #f3f4f6;
        }
        .message.alex .bubble table th {
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #e5e7eb;
            background: #f3f4f6;
        }
        .message.alex .bubble table td {
            padding: 10px;
            border: 1px solid #ddd;
        }
        .message.alex .bubble table tbody tr:nth-child(odd) {
            background: #fafbfc;
        }
        .message.alex .bubble table tbody tr:nth-child(even) {
            background: #ffffff;
        }

        /* --- 输入区域 (Input Area) --- */
        .chat-input-area {
            padding: 16px 24px 24px 24px;
            background: white;
            border-top: 1px solid var(--border-medium);
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
            overflow-x: auto;
            padding-bottom: 4px;
            scrollbar-width: none;
        }
        .quick-actions::-webkit-scrollbar { display: none; }
        
        .quick-action {
            padding: 6px 12px;
            background: white;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-full);
            font-size: 12px;
            font-weight: 500;
            color: var(--text-secondary);
            cursor: pointer;
            white-space: nowrap;
            transition: var(--transition-base);
            display: flex; align-items: center; gap: 6px;
        }
        .quick-action:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: var(--primary-light);
        }
        
        .input-wrapper {
            display: flex;
            gap: 10px;
            align-items: flex-end;
            background: var(--bg-body);
            border: 1px solid transparent;
            border-radius: var(--radius-lg);
            padding: 8px 12px;
            transition: var(--transition-base);
        }

        .input-wrapper:focus-within {
            background: white;
            border-color: var(--primary-color);
            box-shadow: var(--shadow-focus);
        }
        
        .chat-textarea {
            flex: 1;
            padding: 8px 4px;
            border: none;
            background: transparent;
            font-size: 0.925rem;
            color: var(--text-main);
            outline: none;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            overflow-y: auto;
            line-height: 1.5;
            min-height: 24px;
        }
        .chat-textarea::placeholder { color: var(--text-tertiary); }
        
        .send-btn {
            width: 36px;
            height: 36px;
            border-radius: var(--radius-md);
            background: var(--primary-color);
            color: white;
            border: none;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-bottom: 2px;
        }
        .send-btn:hover { background: var(--primary-hover); }
        .send-btn:disabled { background: var(--text-tertiary); cursor: not-allowed; }

        /* --- 焦点指示器 (Context Focus) --- */
        #propertyFocusIndicator {
            display: none; /* JS 控制 */
            padding: 10px 16px;
            background: #eff6ff;
            border: 1px solid #bfdbfe;
            margin: 0 24px 12px 24px;
            border-radius: var(--radius-md);
            align-items: center;
            justify-content: space-between;
            color: #1e40af;
            font-size: 13px;
            animation: slideIn 0.2s ease;
        }
        @keyframes slideIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        /* --- 右侧结果区 (Results Panel) --- */
        .results-panel {
            flex: 1;
            background: var(--bg-body);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            height: 100%;
        }
        
        .results-header {
            background: white;
            padding: 0 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-medium);
            height: 65px;
            flex-shrink: 0;
        }
        
        .results-header h2 { font-size: 1.125rem; color: var(--text-main); font-weight: 700; }
        
        .view-toggle {
            display: flex;
            background: var(--bg-body);
            padding: 4px;
            border-radius: var(--radius-md);
            gap: 2px;
        }
        
        .toggle-btn {
            padding: 6px 16px;
            background: transparent;
            border: none;
            border-radius: var(--radius-sm);
            color: var(--text-secondary);
            font-weight: 600;
            font-size: 0.85rem;
            cursor: pointer;
            transition: var(--transition-base);
            display: flex; align-items: center; gap: 6px;
        }
        .toggle-btn:hover { color: var(--text-main); }
        .toggle-btn.active {
            background: white;
            color: var(--text-main);
            box-shadow: var(--shadow-sm);
        }
        
        .results-content {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scroll-behavior: smooth;
        }
        
        /* --- 房源卡片 (Property Card) --- */
        .property-card {
            background: white;
            border: 1px solid var(--border-medium);
            border-radius: var(--radius-lg);
            overflow: hidden;
            margin-bottom: 24px;
            transition: var(--transition-base);
            display: flex;
            flex-direction: column;
            box-shadow: var(--shadow-sm);
        }
        .property-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-lg);
            border-color: var(--border-dark);
        }

        @media (min-width: 1024px) {
            .property-card { flex-direction: row; min-height: 220px; }
            .property-image-container { flex: 0 0 300px; height: auto !important; }
        }
        
        .property-image-container {
            position: relative;
            height: 200px;
            background: var(--bg-body);
            cursor: pointer;
            overflow: hidden;
        }
        .property-image { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
        .property-card:hover .property-image { transform: scale(1.03); }

        .rank-badge {
            position: absolute; top: 12px; left: 12px;
            background: white; color: var(--text-main);
            padding: 4px 8px; border-radius: var(--radius-sm); 
            font-weight: 700; font-size: 12px;
            box-shadow: var(--shadow-md);
            z-index: 2;
        }

        .image-count-badge {
            position: absolute; bottom: 12px; right: 12px;
            background: rgba(0,0,0,0.7); color: white;
            padding: 4px 8px; border-radius: var(--radius-sm); 
            font-size: 11px; font-weight: 500;
            display: flex; align-items: center; gap: 4px; backdrop-filter: blur(4px);
        }
        
        .property-content {
            padding: 20px 24px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }
        
        .property-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 6px; }
        .property-address { 
            font-size: 1.1rem; 
            font-weight: 700; 
            color: var(--text-main); 
            line-height: 1.35; 
            margin-right: 12px;
            display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .favorite-btn {
            background: transparent; border: 1px solid var(--border-medium);
            width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition-base); 
            color: var(--text-tertiary); flex-shrink: 0;
        }
        .favorite-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: var(--primary-light); }
        .favorite-btn.active { fill: var(--primary-color); color: var(--primary-color); border-color: var(--primary-color); }
        
        .property-details { display: flex; gap: 16px; margin-bottom: 12px; flex-wrap: wrap; align-items: center; }
        .detail-item { 
            display: flex; align-items: center; gap: 6px; 
            font-size: 0.9rem; font-weight: 600; color: var(--text-main); 
            background: var(--bg-body); padding: 4px 10px; border-radius: var(--radius-sm);
        }
        .detail-item .icon { width: 14px; height: 14px; color: var(--text-secondary); }
        
        .property-explanation {
            font-size: 0.875rem; color: var(--text-secondary); line-height: 1.6;
            margin-bottom: 20px; flex: 1;
            display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
        }
        
        .property-actions { display: flex; gap: 10px; margin-top: auto; }
        .action-btn {
            flex: 1; padding: 9px;
            border: 1px solid var(--border-medium); background: white;
            border-radius: var(--radius-md); cursor: pointer;
            font-size: 0.85rem; font-weight: 600; color: var(--text-main);
            transition: var(--transition-base); display: flex; align-items: center; justify-content: center; gap: 6px;
            text-decoration: none;
        }
        .action-btn:hover { background: var(--bg-hover); border-color: var(--border-dark); }
        .action-btn.primary { 
            background: var(--text-main); 
            color: white; 
            border-color: var(--text-main); 
        }
        .action-btn.primary:hover { background: #000; border-color: #000; }

        /* Loading & Typing Indicators */
        .typing-indicator span { width: 5px; height: 5px; background: var(--text-tertiary); border-radius: 50%; display: inline-block; animation: bounce 1.4s infinite ease-in-out both; margin: 0 2px;}
        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-secondary); }
        .empty-state-icon { margin-bottom: 16px; color: var(--border-dark); }
        
        .spinner { width: 24px; height: 24px; border: 2px solid var(--border-medium); border-top-color: var(--primary-color); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Modal Gallery */
        .modal { background: rgba(0, 0, 0, 0.92); z-index: 2000; display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-content { width: 100%; height: 100%; position: relative; display: flex; flex-direction: column; }
        .gallery-main-image { width: 100%; height: 100%; object-fit: contain; }
        .gallery-nav button { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 48px; height: 48px; border-radius: 50%; cursor: pointer; z-index: 10; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .gallery-nav button:hover { background: rgba(255,255,255,0.2); }
        .gallery-nav button:first-child { left: 24px; }
        .gallery-nav button:last-child { right: 24px; }
        .modal-close-btn { position: absolute; top: 24px; right: 24px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.1); color: white; width: 40px; height: 40px; border-radius: 50%; cursor: pointer; z-index: 20; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .modal-close-btn:hover { background: rgba(255,255,255,0.2); transform: rotate(90deg); }
        .gallery-thumbnails { position: absolute; bottom: 30px; left: 0; width: 100%; display: flex; justify-content: center; gap: 8px; z-index: 10; padding: 0 20px; overflow-x: auto; }
        .gallery-thumbnail { width: 60px; height: 40px; object-fit: cover; border-radius: 4px; opacity: 0.5; cursor: pointer; transition: all 0.2s; border: 2px solid transparent; }
        .gallery-thumbnail.active { opacity: 1; border-color: var(--primary-color); transform: translateY(-4px); }

        /* Alert Box */
        .alert-box {
            border: 1px solid;
            border-radius: var(--radius-lg);
            padding: 16px;
            margin-bottom: 24px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        .alert-warning { background: #fffbeb; border-color: #fcd34d; color: #92400e; }
        .alert-success { background: #ecfdf5; border-color: #a7f3d0; color: #065f46; }

        @media (max-width: 1024px) {
            .main-container { flex-direction: column; height: auto; }
            .chat-panel { flex: none; height: 60vh; width: 100%; border-bottom: 1px solid var(--border-medium); }
            .results-panel { min-height: 60vh; }
            .navbar { padding: 0 16px; }
            .results-header { padding: 0 16px; }
            .results-content { padding: 16px; }
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="#" class="brand">
            <div class="brand-logo-bg">
                <svg class="icon" viewBox="0 0 24 24"><path d="M3 21h18M5 21V7l8-4 8 4v14M8 21v-2a4 4 0 0 1 4-4v0a4 4 0 0 1 4 4v2"/></svg>
            </div>
            <span data-i18n="brand">Alex</span>
        </a>
        
        <div class="lang-switch">
            <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('zh')">中文</button>
        </div>
    </nav>

    <div class="main-container">
        <!-- LEFT PANEL -->
        <div class="chat-panel">
            <div class="chat-header">
                <h1 data-i18n="assistant_title">
                    <svg class="icon icon-sm" style="color:var(--primary-color);" viewBox="0 0 24 24"><path d="M12 2a10 10 0 1 0 10 10H12V2z"/><path d="M12 2a10 10 0 0 1 10 10"/></svg>
                    AI Assistant
                </h1>
                <p data-i18n="assistant_subtitle">London Rental Intelligence</p>
            </div>
            
            <div class="chat-messages" id="chatMessages">
                <!-- Welcome message generated by JS -->
            </div>
            
            <div id="propertyFocusIndicator"></div>

            <div class="chat-input-area">
                <div class="quick-actions" id="quickActions">
                    <!-- Generated by JS -->
                </div>
                
                <div class="input-wrapper">
                    <textarea 
                        class="chat-textarea" 
                        id="chatInput" 
                        rows="1" 
                        placeholder="Message Alex..."
                        oninput="autoResize(this)"
                        onkeydown="handleEnter(event)"
                    ></textarea>
                    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
                        <svg class="icon" viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>

        /* -------------------------------------------------------------------------- */
        /* API FETCH WRAPPER (Fixes "Failed to parse URL" errors)                     */
        /* -------------------------------------------------------------------------- */
        async function apiFetch(endpoint, options = {}) {
            // Ensure endpoint starts with / if not already
            if (!endpoint.startsWith('/')) endpoint = '/' + endpoint;
            
            let url = endpoint;
            
            // Detect if we are in a blob/file environment where relative URLs fail
            const isLocalContext = window.location.protocol === 'file:' || window.location.protocol === 'blob:';
            
            if (API_BASE_URL) {
                url = API_BASE_URL + endpoint;
            } else if (isLocalContext) {
                // In a local/preview context with no explicit API_BASE_URL, 
                // we default to a likely local backend to prevent URL parsing errors.
                // You can change this default port if your python/node server is different.
                url = 'http://localhost:5000' + endpoint;
                console.warn(`[Alex UI] Detected local/blob environment. Defaulting API calls to ${url}. Configure API_BASE_URL in script if needed.`);
            }

            try {
                const response = await fetch(url, options);
                return response;
            } catch (error) {
                console.warn(`[Alex UI] Fetch error for ${url}:`, error);
                // Return a safe dummy response object so calling code doesn't crash immediately
                return {
                    ok: false,
                    status: 0,
                    statusText: "Network Error",
                    json: async () => ({ error: "Connection failed. Backend may be offline." }),
                    text: async () => "Connection failed"
                };
            }
        }

        // --- [FIX] ReAct 过滤函数：清洗模型思维链 ---
        // 专门用于移除模型输出中的 Thought, Action, Observation 等中间步骤，只保留最终回复
        function cleanRawResponse(text) {
            if (!text) return "";
            
            // 🆕 策略 0: 全面检查 JSON 格式 - 处理所有可能的情况
            // 包括 {"answer": "..."}, {"response": "..."} 等
            if (text.trim().startsWith('{')) {
                try {
                    const jsonData = JSON.parse(text.trim());
                    // 尝试提取所有可能的响应字段
                    const possibleKeys = ['achanswer', 'response', 'response_text', 'message', 'text', 'content', 'result'];
                    for (const key of possibleKeys) {
                        if (jsonData[key] && typeof jsonData[key] === 'string') {
                            text = jsonData[key];
                            break;
                        }
                    }
                    // 如果没找到已知键，但只有一个字符串值，用它
                    if (text.trim().startsWith('{')) {
                        const values = Object.values(jsonData);
                        const stringValue = values.find(v => typeof v === 'string' && v.length > 20);
                        if (stringValue) {
                            text = stringValue;
                        }
                    }
                } catch (e) {
                    // 不是有效 JSON，检查是否是截断的 JSON
                    // 如 '{\n  "answer": "内容...' 这种情况
                    const partialMatch = text.match(/"(?:answer|response|message|text)"\s*:\s*"([^"]+)/i);
                    if (partialMatch && partialMatch[1]) {
                        text = partialMatch[1];
                    }
                }
            }
            
            // 🆕 策略 0.5: 清理 markdown 格式
            text = text.replace(/^\s*\*\*Final Answer:\*\*\s*/i, '');
            text = text.replace(/^\s*\*\*Final Answer:\s*/i, '');
            text = text.replace(/^\s*Final Answer:\s*/i, '');
            
            // 如果文本以 ** 开头但不是标题，移除它
            if (text.startsWith('**') && !text.startsWith('**#')) {
                if (text === '**' || text === '** ') {
                    text = '';
                }
            }
            
            // 策略 1: 如果模型输出了 "Final Answer:"
            const finalAnswerRegex = /Final Answer:\s*([\s\S]+)/i;
            const match = text.match(finalAnswerRegex);
            if (match && match[1]) {
                return match[1].trim();
            }

            // 策略 2: 如果没有 Final Answer 标记，则尝试去除 Thought/Action 块
            // 移除以 Thought:, Action:, Observation: 开头的行或块
            let cleanText = text;
            
            // 移除 ReAct 常见的块状标记
            // 使用正则非贪婪匹配移除这些块
            cleanText = cleanText.replace(/Thought:[\s\S]*?(?=(Final Answer:|Action:|Observation:|$))/gi, "");
            cleanText = cleanText.replace(/Action:[\s\S]*?(?=(Final Answer:|Observation:|$))/gi, "");
            cleanText = cleanText.replace(/Observation:[\s\S]*?(?=(Final Answer:|Thought:|$))/gi, "");
            
            // 兜底：移除残余的关键字标记
            cleanText = cleanText.replace(/(Thought|Action|Action Input|Observation):/gi, "");

            return cleanText.trim();
        }
        
        // Formatter handles Markdown -> HTML (Enhanced with Emoji support)
        function formatMessage(text) {
            if (!text) return '';
            
            // 🆕 先保护 SVG - 在转义前提取 SVG，处理后再还原
            const svgRegex = /<svg[^>]*>[\s\S]*?<\/svg>/g;
            const svgs = text.match(svgRegex) || [];
            let html = text;
            
            // 替换 SVG 为占位符
            let svgPlaceholders = {};
            svgs.forEach((svg, index) => {
                const placeholder = `__SVG_PLACEHOLDER_${index}__`;
                svgPlaceholders[placeholder] = svg;
                html = html.replace(svg, placeholder);
            });
            
            // 🔧 FIX: 先提取链接，避免被HTML转义破坏
            const linkRegex = /\[([^\]]+)\]\(([^)]+)\)/g;
            const links = [];
            let linkMatch;
            while ((linkMatch = linkRegex.exec(html)) !== null) {
                links.push({
                    full: linkMatch[0],
                    text: linkMatch[1],
                    url: linkMatch[2],
                    placeholder: `__LINK_PLACEHOLDER_${links.length}__`
                });
            }
            
            // 替换链接为占位符
            links.forEach(link => {
                html = html.replace(link.full, link.placeholder);
            });
            
            // 只转义 HTML 特殊字符，但保留 emoji 和占位符
            html = html.replace(/&/g, "&amp;");
            html = html.replace(/</g, "&lt;");
            html = html.replace(/>/g, "&gt;");
            
            // Markdown 解析 - 分割线 (必须在标题之前处理)
            html = html.replace(/^---+$/gm, '<hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">');
            html = html.replace(/^\*\*\*+$/gm, '<hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">');
            html = html.replace(/^___+$/gm, '<hr style="border:none;border-top:1px solid #e5e7eb;margin:16px 0;">');
            
            // Markdown 解析 - 标题 (支持 1-6 级)
            html = html.replace(/^###### (.+)$/gm, '<h6 style="font-size:0.85rem;font-weight:600;margin:8px 0 4px 0;color:#374151;">$1</h6>');
            html = html.replace(/^##### (.+)$/gm, '<h5 style="font-size:0.9rem;font-weight:600;margin:8px 0 4px 0;color:#374151;">$1</h5>');
            html = html.replace(/^#### (.+)$/gm, '<h4 style="font-size:0.95rem;font-weight:600;margin:10px 0 6px 0;color:#1f2937;">$1</h4>');
            html = html.replace(/^### (.+)$/gm, '<h4>$1</h4>');
            html = html.replace(/^## (.+)$/gm, '<h3>$1</h3>');
            html = html.replace(/^# (.+)$/gm, '<h2>$1</h2>');
            
            // 粗体和斜体
            html = html.replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
            html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
            
            // 行内代码
            html = html.replace(/`([^`]+)`/g, '<code style="background:#f3f4f6;padding:2px 6px;border-radius:4px;font-size:0.9em;">$1</code>');
            
            // 🔧 FIX: 还原链接（已经是正确的HTML格式）
            links.forEach(link => {
                const linkHtml = `<a href="${link.url}" target="_blank" rel="noopener noreferrer" style="color:var(--primary-color);text-decoration:underline;">${link.text}</a>`;
                html = html.replace(link.placeholder, linkHtml);
            });
            
            // 处理表格 - Markdown 表格格式
            // 识别 | 分隔的表格
            const lines = html.split('\n');
            const tables = [];
            let i = 0;
            
            while (i < lines.length) {
                const line = lines[i];
                
                // 检查是否是表格头部 (以 | 开头，包含数据)
                if (line.trim().startsWith('|') && line.trim().endsWith('|') && i + 1 < lines.length) {
                    const nextLine = lines[i + 1];
                    
                    // 检查下一行是否是分隔符 (|---|--| 格式)
                    if (nextLine.trim().startsWith('|') && /^[\|\s\-:]+$/.test(nextLine.trim())) {
                        // 这是表格!
                        const headerLine = line;
                        const headers = headerLine.split('|').map(h => h.trim()).filter(h => h);
                        
                        // 收集表格行
                        const rows = [];
                        let j = i + 2;
                        while (j < lines.length && lines[j].trim().startsWith('|') && /^[\|\s\-:]/.test(lines[j].trim())) {
                            const cells = lines[j].split('|').map(cell => cell.trim()).filter(cell => cell);
                            if (cells.length > 0) {
                                rows.push(cells);
                            }
                            j++;
                        }
                        
                        // 生成 HTML 表格
                        let tableHtml = '<table style="width:100%;border-collapse:collapse;margin:12px 0;border:1px solid #ddd;">';
                        tableHtml += '<thead><tr style="background:#f3f4f6;border-bottom:2px solid #e5e7eb;">';
                        headers.forEach(header => {
                            tableHtml += `<th style="padding:10px;text-align:left;font-weight:600;border-right:1px solid #ddd;">${header}</th>`;
                        });
                        tableHtml += '</tr></thead>';
                        
                        tableHtml += '<tbody>';
                        rows.forEach((row, idx) => {
                            const bgColor = idx % 2 === 0 ? 'white' : '#fafbfc';
                            tableHtml += `<tr style="background:${bgColor};border-bottom:1px solid #ddd;">`;
                            row.forEach(cell => {
                                tableHtml += `<td style="padding:10px;border-right:1px solid #ddd;">${cell}</td>`;
                            });
                            tableHtml += '</tr>';
                        });
                        tableHtml += '</tbody>';
                        tableHtml += '</table>';
                        
                        tables.push({ startIdx: i, endIdx: j - 1, html: tableHtml });
                        i = j;
                        continue;
                    }
                }
                i++;
            }
            
            // 将表格从后向前替换（避免索引偏移）
            for (let idx = tables.length - 1; idx >= 0; idx--) {
                const table = tables[idx];
                // 替换对应的行
                lines.splice(table.startIdx, table.endIdx - table.startIdx + 1, `__TABLE_PLACEHOLDER_${idx}__`);
            }
            
            html = lines.join('\n');
            
            // 处理列表 - 改进版本
            const linesList = html.split('\n');
            let output = [];
            let inUl = false;
            let inOl = false;
            let olStarted = false;  // 追踪有序列表是否已经开始
            
            linesList.forEach((line, lineIdx) => {
                const trimmedLine = line.trim();
                
                // 无序列表: - 或 *
                if (trimmedLine.match(/^[-*]\s+/) && !trimmedLine.startsWith('|')) {
                    if (inOl) { output.push('</ol>'); inOl = false; olStarted = false; }
                    if (!inUl) { output.push('<ul>'); inUl = true; }
                    output.push(`<li>${trimmedLine.replace(/^[-*]\s+/, '')}</li>`);
                }
                // 有序列表: 1. 2. 等（支持重复的 1.）
                else if (trimmedLine.match(/^\d+[\.\)]\s+/) && !trimmedLine.startsWith('|')) {
                    if (inUl) { output.push('</ul>'); inUl = false; }
                    
                    // 检查是否需要开始新的有序列表
                    // 如果上一行不是列表项，则开始新列表
                    const prevLine = lineIdx > 0 ? linesList[lineIdx - 1].trim() : '';
                    const isPrevListItem = prevLine.match(/^[-*\d+][\.\)\s]/) || inOl;
                    
                    if (!inOl || !isPrevListItem) {
                        if (inOl) { output.push('</ol>'); }
                        output.push('<ol>');
                        inOl = true;
                        olStarted = true;
                    }
                    
                    // 提取列表项内容（移除序号）
                    const itemContent = trimmedLine.replace(/^\d+[\.\)]\s+/, '');
                    output.push(`<li>${itemContent}</li>`);
                }
                // 普通段落
                else {
                    if (inUl) { output.push('</ul>'); inUl = false; }
                    if (inOl) { output.push('</ol>'); inOl = false; olStarted = false; }
                    if (trimmedLine) {
                        output.push(`<p>${line}</p>`);
                    }
                }
            });
            
            // 关闭未关闭的列表
            if (inUl) output.push('</ul>');
            if (inOl) output.push('</ol>');
            
            html = output.join('');
            
            // 还原表格占位符
            tables.forEach((table, idx) => {
                const placeholder = `__TABLE_PLACEHOLDER_${idx}__`;
                html = html.replace(`<p>${placeholder}</p>`, table.html);
                html = html.replace(placeholder, table.html);
            });
            
            // 🆕 还原 SVG - 保证 SVG 完整性
            Object.entries(svgPlaceholders).forEach(([placeholder, svg]) => {
                html = html.replace(placeholder, svg);
            });
            
            return html;
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message || isProcessing) return;
            
            isProcessing = true;
            document.getElementById('sendBtn').disabled = true;
            
            addMessage(message, 'user');
            
            input.value = '';
            input.style.height = 'auto';
            
            showTypingIndicator();
            
            try {
                const isContinuation = lastResponseType === 'clarification';
                
                // Use apiFetch wrapper
                const response = await apiFetch('/api/alex', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: message,
                        context: currentPropertyContext ? { property: currentPropertyContext } : {},
                        is_continuation: isContinuation,
                        language: currentLang 
                    })
                });
                
                const data = await response.json();
                removeTypingIndicator();
                
                if (data.error) {
                    addMessage(`${getIcon('error', 'icon-sm')} ${data.error}`, 'alex');
                    lastResponseType = 'error';
                } else if (data.response_type === 'clarification') {
                    // --- [FIX] 清洗消息 ---
                    const cleanMsg = cleanRawResponse(data.message);
                    addMessage(`${getIcon('question', 'icon-sm')} ${cleanMsg}`, 'alex');
                    lastResponseType = 'clarification';
                } else if (data.response_type === 'search' && data.recommendations) {
                    // --- [FIX] 清洗消息 ---
                    const cleanMsg = cleanRawResponse(data.message || t('empty_state_desc'));
                    addMessage(cleanMsg, 'alex'); 
                    currentResults = data.recommendations;
                    displayResults(data.recommendations);
                    lastResponseType = 'search';
                } else {
                    // --- [FIX] 清洗消息 ---
                    const rawText = data.message || data.response || "I couldn't get a response from the server.";
                    const cleanText = cleanRawResponse(rawText);
                    
                    addMessage(cleanText, 'alex');
                    if (data.recommendations && data.recommendations.length > 0) {
                        currentResults = data.recommendations;
                        displayResults(data.recommendations);
                        lastResponseType = 'search';
                    } else {
                        lastResponseType = 'answer';
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage(`${getIcon('error', 'icon-sm')} ${t('error_connection')}`, 'alex');
                console.error('Error:', error);
                lastResponseType = 'error';
            }
            
            isProcessing = false;
            document.getElementById('sendBtn').disabled = false;
            if (window.innerWidth > 1024) input.focus();
        }
        
        function sendQuickMessage(text) {
            const input = document.getElementById('chatInput');
            input.value = text;
            autoResize(input);
            sendMessage();
        }
        
        function addMessage(text, sender) {
            const messagesDiv = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${sender}`;
            
            // 🆕 处理后端返回的 SVG icons - 修复转义问题
            let processedText = text;
            
            // 修复被转义的 SVG 标签
            // 从 &lt;svg 还原为 <svg，从 &gt; 还原为 >
            if (processedText.includes('&lt;svg')) {
                processedText = processedText.replace(/&lt;svg/g, '<svg');
                processedText = processedText.replace(/&gt;/g, '>');
                processedText = processedText.replace(/&quot;/g, '"');
                processedText = processedText.replace(/&#x27;/g, "'");
            }
            
            const formattedText = sender === 'alex' ? formatMessage(processedText) : processedText;
            
            if (sender === 'alex') {
                messageDiv.innerHTML = `
                    <div class="sender">${t('brand')}</div>
                    <div class="bubble">${formattedText}</div>
                `;
            } else {
                messageDiv.innerHTML = `<div class="bubble">${text}</div>`;
            }
            
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function showTypingIndicator() {
            const messagesDiv = document.getElementById('chatMessages');
            const indicator = document.createElement('div');
            indicator.id = 'typingIndicator';
            indicator.className = 'message alex';
            indicator.innerHTML = `
                <div class="sender">${t('brand')}</div>
                <div class="bubble">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(indicator);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }
        
        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) indicator.remove();
        }
        
        /* -------------------------------------------------------------------------- */
        /* RESULTS & CARDS                                  */
        /* -------------------------------------------------------------------------- */
        function displayResults(recommendations) {
            // Ensure we are on the results tab
            if(document.getElementById('btn-results')) {
               document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
               document.getElementById('btn-results').classList.add('active');
            }

            const content = document.getElementById('resultsContent');
            
            if (!recommendations || recommendations.length === 0) {
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">
                            ${getIcon('search', 'icon-lg')}
                        </div>
                        <h3>${t('no_results_title')}</h3>
                        <p>${t('no_results_desc')}</p>
                    </div>
                `;
                return;
            }
            
            const isSimilarSuggestion = recommendations[0]?.match_type === 'similar_suggestion';
            
            let headerHTML = '';
            if (isSimilarSuggestion) {
                headerHTML = `
                    <div class="alert-box alert-warning">
                        ${getIcon('warning')}
                        <div>
                            <strong style="display:block;margin-bottom:2px;">${t('similar_alert_title')}</strong>
                            <span style="font-size:0.9em;">${t('similar_alert_desc')}</span>
                        </div>
                    </div>
                `;
            }
            
            content.innerHTML = headerHTML + recommendations.map(rec => createPropertyCard(rec)).join('');
        }

        function createPropertyCard(rec) {
            const images = rec.images || [];
            const hasImages = images.length > 0;
            const isFavorited = favorites.has(rec.url);
            
            // 判断是否是相似推荐或软性违规
            const isOverBudget = rec.match_type === 'similar_suggestion' || rec.match_type === 'soft_violation';
            
            const heartClass = isFavorited ? 'favorite-btn active' : 'favorite-btn';
            
            // --- [FIX] 预算标签优化逻辑 ---
            let badge = '';
            if (rec.budget_status) {
                // 1. 去除所有 Emoji 和特殊符号 (只保留文字和空格)
                // 这样无论后端传什么 ✅, ❌, ⚠️，我们都先清理掉
                let cleanStatus = rec.budget_status.replace(/✅|❌|⚠️/g, '').trim();
                
                // 2. 语义映射：根据 cleanStatus 中的关键词判断显示什么（解决中英文问题）
                // 如果后端传来的是 "Within Budget" 或 "在预算内"
                let displayText = cleanStatus;
                let isGreen = true;

                // 简单的关键词匹配来决定显示哪种专业术语
                if (cleanStatus.toLowerCase().includes('within') || cleanStatus.includes('内') || cleanStatus.includes('OK')) {
                    displayText = t('status_budget_ok'); // "Within Budget" or "预算范围内"
                    isGreen = true;
                } else if (cleanStatus.toLowerCase().includes('over') || cleanStatus.includes('超出') || cleanStatus.includes('High')) {
                    displayText = t('status_budget_over'); // "Over Budget" or "超出预算"
                    isGreen = false;
                } else {
                    // 兜底：如果有些奇怪的状态，直接显示清洗后的文字
                    displayText = cleanStatus;
                    isGreen = !isOverBudget;
                }

                // 3. 样式定义
                const style = isGreen 
                    ? 'background:#ecfdf5;color:#047857;border:1px solid #a7f3d0;' // 绿色系
                    : 'background:#fffbeb;color:#b45309;border:1px solid #fcd34d;'; // 黄色系 (警告)

                badge = `<span style="font-size:11px;padding:2px 8px;border-radius:4px;font-weight:600;display:inline-block;${style}">${displayText}</span>`;
            }

            return `
                <div class="property-card">
                    <div class="property-image-container" onclick='openGallery(${JSON.stringify(images)}, "${escapeHtml(rec.address)}")'>
                        ${hasImages ? `
                            <img src="${images[0]}" alt="${escapeHtml(rec.address)}" class="property-image" onerror="this.style.display='none'">
                            <span class="image-count-badge">${getIcon('camera', 'icon-sm')} ${images.length}</span>
                        ` : `
                            <div style="display:flex;align-items:center;justify-content:center;height:100%;color:#9ca3af;flex-direction:column;gap:8px;">
                                ${getIcon('building')} <span style="font-size:12px">No Image</span>
                            </div>
                        `}
                        <span class="rank-badge">#${rec.rank}</span>
                    </div>
                    <div class="property-content">
                        <div>
                            <div class="property-header">
                                <div class="property-address">${rec.address}</div>
                                <button class="${heartClass}" onclick="toggleFavorite('${escapeHtml(rec.url)}')" title="Save">
                                    <svg class="icon" style="${isFavorited ? 'fill:currentColor' : ''}" viewBox="0 0 24 24"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"></path></svg>
                                </button>
                            </div>
                            <div class="property-details">
                                <div class="detail-item">${getIcon('money')} ${rec.price}</div>
                                <div class="detail-item">${getIcon('clock')} ${rec.travel_time}</div>
                                ${badge}
                            </div>
                            <div class="property-explanation">${rec.explanation || ''}</div>
                        </div>
                        <div class="property-actions">
                            <a href="${rec.url}" target="_blank" class="action-btn primary">${t('view_deal')}</a>
                            <button class="action-btn" onclick='openMap("${escapeHtml(rec.address)}", "${rec.geo_location || ''}", "${rec.price}", "${rec.travel_time}")'>
                                ${getIcon('mapPin', 'icon-sm')} ${t('map_btn')}
                            </button>
                            <button class="action-btn" onclick='askAboutProperty(${JSON.stringify({address: rec.address, price: rec.price, travel_time: rec.travel_time})})'>
                                ${getIcon('chat', 'icon-sm')} ${t('ask_ai_btn')}
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }
        
        function askAboutProperty(property) {
            currentPropertyContext = property;
            const indicator = document.getElementById('propertyFocusIndicator');
            indicator.style.display = 'flex';
            
            indicator.innerHTML = `
                <div style="display:flex;align-items:center;gap:8px;">
                    ${getIcon('mapPin', 'icon-sm')}
                    <span>${t('focusing_on')} <strong>${property.address.substring(0, 30)}...</strong></span>
                </div>
                <button onclick="clearPropertyFocus()" style="background:none;border:none;cursor:pointer;color:currentColor;display:flex;">
                    ${getIcon('close', 'icon-sm')}
                </button>
            `;
            
            const input = document.getElementById('chatInput');
            input.placeholder = t('placeholder_focus');
            input.focus();
        }
        
        function clearPropertyFocus() {
            currentPropertyContext = null;
            document.getElementById('propertyFocusIndicator').style.display = 'none';
            document.getElementById('chatInput').placeholder = t('placeholder_input');
        }
        
        function switchView(view) {
            document.querySelectorAll('.toggle-btn').forEach(btn => btn.classList.remove('active'));
            if(view === 'results') document.getElementById('btn-results').classList.add('active');
            else document.getElementById('btn-favorites').classList.add('active');
            
            if (view === 'favorites') {
                loadFavorites();
            } else {
                displayResults(currentResults);
            }
        }

        /* -------------------------------------------------------------------------- */
        /* FAVORITES LOGIC                                  */
        /* -------------------------------------------------------------------------- */
        async function toggleFavorite(url) {
            const property = currentResults.find(r => r.url === url);
            const isRemoving = favorites.has(url);
            
            try {
                if (isRemoving) {
                    await apiFetch(`/api/favorites/${encodeURIComponent(url)}`, { method: 'DELETE' });
                    favorites.delete(url);
                } else if (property) {
                    await apiFetch('/api/favorites', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            URL: property.url,
                            Address: property.address,
                            Price: property.price,
                            travel_time_minutes: parseInt(property.travel_time) || 0,
                            explanation: property.explanation,
                            Images: property.images || []
                        })
                    });
                    favorites.add(url);
                }
                
                updateFavCount();
                
                // Refresh view if needed
                const isSavedView = document.getElementById('btn-favorites').classList.contains('active');
                if (isSavedView) loadFavorites();
                else displayResults(currentResults);
                
            } catch (error) {
                console.error('Favorite error:', error);
            }
        }
        
        async function loadFavorites() {
            const content = document.getElementById('resultsContent');
            
            // Only show loader if we are switching tabs, not toggling a heart
            if (content.innerHTML === '') {
                 content.innerHTML = '<div style="text-align:center;padding:60px;"><div class="spinner"></div></div>';
            }
            
            try {
                // Use apiFetch instead of raw fetch
                const response = await apiFetch('/api/favorites');
                
                // Check if the mock wrapper returned a valid ok response
                if (!response.ok) {
                    throw new Error("API not available");
                }
                
                const data = await response.json();
                
                if (data.favorites && data.favorites.length > 0) {
                    favorites = new Set(data.favorites.map(f => f.URL));
                    updateFavCount();
                    
                    const favsAsResults = data.favorites.map((fav, i) => ({
                        rank: i + 1,
                        address: fav.Address,
                        price: fav.Price,
                        travel_time: (fav.travel_time_minutes || 'N/A') + ' min',
                        explanation: fav.explanation || '',
                        url: fav.URL,
                        images: fav.Images || [],
                        geo_location: fav.geo_location || ''
                    }));
                    
                    content.innerHTML = favsAsResults.map(rec => createPropertyCard(rec)).join('');
                    
                } else {
                    content.innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">${getIcon('heart', 'icon-lg')}</div>
                            <h3>${t('empty_saved_title')}</h3>
                            <p>${t('empty_saved_desc')}</p>
                        </div>
                    `;
                    favorites.clear();
                    updateFavCount();
                }
            } catch (error) {
                console.warn("Could not load favorites:", error);
                // Fallback UI instead of crash
                content.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon" style="opacity:0.5">${getIcon('error', 'icon-lg')}</div>
                        <h3>Backend Offline</h3>
                        <p>Could not connect to the database to load favorites.</p>
                    </div>
                `;
            }
        }
        
        function updateFavCount() {
            document.getElementById('favCount').textContent = favorites.size;
        }

        /* -------------------------------------------------------------------------- */
        /* MODAL & MAP                                       */
        /* -------------------------------------------------------------------------- */
        function openGallery(images, address) {
            if (!images || images.length === 0) return;
            currentGalleryImages = images;
            currentImageIndex = 0;
            document.getElementById('imageModal').style.display = 'flex';
            updateGalleryImage();
        }
        
        function closeModal() { document.getElementById('imageModal').style.display = 'none'; }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = currentGalleryImages.length - 1;
            if (currentImageIndex >= currentGalleryImages.length) currentImageIndex = 0;
            updateGalleryImage();
        }
        
        function updateGalleryImage() {
            document.getElementById('galleryMainImage').src = currentGalleryImages[currentImageIndex];
            document.getElementById('galleryThumbnails').innerHTML = currentGalleryImages.map((img, i) => `
                <img src="${img}" class="gallery-thumbnail ${i === currentImageIndex ? 'active' : ''}" onclick="currentImageIndex = ${i}; updateGalleryImage()">
            `).join('');
        }

        async function openMap(address, geoLocation, price, travelTime) {
            const btn = event.target.closest('button');
            const originalHTML = btn.innerHTML;
            btn.innerHTML = t('loading_map'); btn.disabled = true;
            try {
                // Use apiFetch
                const response = await apiFetch('/api/generate_map', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ address, geo_location: geoLocation, price, travel_time: travelTime })
                });
                if (response.ok) {
                    const mapHtml = await response.text();
                    const win = window.open('', '_blank');
                    win.document.write(mapHtml);
                    win.document.close();
                }
            } catch (e) { alert(t('error_connection')); }
            finally { btn.innerHTML = originalHTML; btn.disabled = false; }
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML.replace(/"/g, '&quot;');
        }

        // Initialization
        (function init() {
            setLanguage('en'); // Default to English
            loadFavorites().catch(e => console.log("Init error handled"));
        })();
        
    </script>
</body>
</html>
