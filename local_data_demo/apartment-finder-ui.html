<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Apartment Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            min-height: 100vh;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 50%, rgba(255, 255, 255, 0.1) 0%, transparent 50%),
                        radial-gradient(circle at 80% 80%, rgba(255, 255, 255, 0.1) 0%, transparent 50%);
            animation: pulse 8s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.98);
            border-radius: 30px;
            box-shadow: 0 30px 80px rgba(0,0,0,0.3);
            overflow: hidden;
            position: relative;
            z-index: 1;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }
        
        .header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(255,255,255,0.1) 0%, transparent 70%);
            animation: rotate 20s linear infinite;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .header h1 {
            font-size: 3em;
            margin-bottom: 10px;
            position: relative;
            z-index: 1;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
            animation: slideDown 0.6s ease-out;
        }
        
        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .header p {
            position: relative;
            z-index: 1;
            font-size: 1.1em;
            opacity: 0.95;
        }
        
        .tabs {
            display: flex;
            background: linear-gradient(to right, #f8f9fa, #e9ecef);
            border-bottom: 3px solid #dee2e6;
        }
        
        .tab {
            flex: 1;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            background: transparent;
            border: none;
            font-size: 17px;
            font-weight: 600;
            color: #495057;
            transition: all 0.3s ease;
            position: relative;
        }
        
        .tab:hover {
            background: rgba(102, 126, 234, 0.08);
            transform: translateY(-2px);
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 4px solid #667eea;
        }
        
        .tab-content {
            display: none;
            padding: 40px;
            animation: fadeIn 0.4s ease-in;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-box {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            position: relative;
        }
        
        .search-box::before {
            content: '🔍';
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 20px;
            opacity: 0.5;
            pointer-events: none;
        }
        
        #queryInput {
            flex: 1;
            padding: 18px 20px 18px 55px;
            font-size: 16px;
            border: 3px solid #dee2e6;
            border-radius: 15px;
            outline: none;
            transition: all 0.3s ease;
        }
        
        #queryInput:focus {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }
        
        #searchBtn {
            padding: 18px 45px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        #searchBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }
        
        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .property-card {
            background: white;
            border: 2px solid #e9ecef;
            border-radius: 20px;
            overflow: hidden;
            margin-bottom: 25px;
            transition: all 0.4s ease;
            animation: slideUp 0.5s ease-out;
        }
        
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .property-card:hover {
            box-shadow: 0 15px 40px rgba(102, 126, 234, 0.25);
            transform: translateY(-8px);
            border-color: #667eea;
        }
        
        .property-image-container {
            position: relative;
            width: 100%;
            height: 280px;
            overflow: hidden;
            background: linear-gradient(135deg, #f0f0f0 0%, #e0e0e0 100%);
            cursor: pointer;
        }
        
        .property-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.6s ease;
        }
        
        .property-card:hover .property-image {
            transform: scale(1.1);
        }
        
        .image-count-badge {
            position: absolute;
            top: 15px;
            left: 15px;
            background: rgba(0, 0, 0, 0.8);
            color: white;
            padding: 8px 15px;
            border-radius: 25px;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .rank-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 8px 20px;
            border-radius: 25px;
            font-weight: bold;
            font-size: 15px;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }
        
        .property-content {
            padding: 25px;
        }
        
        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .favorite-btn:hover {
            transform: scale(1.3);
        }
        
        .property-address {
            font-size: 20px;
            font-weight: 700;
            color: #212529;
            margin-bottom: 12px;
        }
        
        .property-details {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #6c757d;
            padding: 8px 15px;
            background: #f8f9fa;
            border-radius: 10px;
        }
        
        .property-explanation {
            color: #495057;
            line-height: 1.7;
            margin-bottom: 20px;
            padding: 15px;
            background: rgba(102, 126, 234, 0.05);
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }
        
        .property-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .property-link, .map-btn, .view-gallery-btn, .chat-btn {
            flex: 1;
            min-width: 140px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 20px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 15px;
            font-weight: 600;
            color: white;
        }
        
        .property-link {
            background: linear-gradient(135deg, #667eea, #764ba2);
        }
        
        .map-btn {
            background: linear-gradient(135deg, #ea5455, #ff6b6b);
        }
        
        .view-gallery-btn {
            background: linear-gradient(135deg, #28a745, #20c997);
        }
        
        .chat-btn {
            background: linear-gradient(135deg, #f093fb, #f5576c);
        }
        
        .property-link:hover, .map-btn:hover, .view-gallery-btn:hover, .chat-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0,0,0,0.15);
        }
        /* Chat Widget */
        .chat-widget {
            position: fixed;
            bottom: 30px;
            right: 30px;
            z-index: 1000;
        }
        
        .chat-toggle {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            font-size: 30px;
            cursor: pointer;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
            transition: all 0.3s ease;
        }
        
        .chat-toggle:hover {
            transform: scale(1.1);
        }
        
        .chat-box {
            display: none;
            position: fixed;
            bottom: 120px;
            right: 30px;
            width: 400px;
            height: 550px;
            background: white;
            border-radius: 25px;
            box-shadow: 0 15px 50px rgba(0,0,0,0.3);
            flex-direction: column;
            overflow: hidden;
        }
        
        .chat-box.active {
            display: flex;
        }
        
        .chat-header {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            padding: 20px;
            font-weight: bold;
            font-size: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .chat-close {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
        
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
        }
        
        .chat-message {
            margin-bottom: 15px;
            animation: fadeIn 0.3s ease-in;
        }
        
        .chat-message.user {
            text-align: right;
        }
        
        .chat-message .message-bubble {
            display: inline-block;
            max-width: 80%;
            padding: 12px 18px;
            border-radius: 18px;
            word-wrap: break-word;
        }
        
        .chat-message.user .message-bubble {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }
        
        .chat-message.ai .message-bubble {
            background: #e9ecef;
            color: #333;
        }
        
        .chat-input-container {
            padding: 15px;
            background: white;
            border-top: 2px solid #e9ecef;
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 12px;
            border: 2px solid #dee2e6;
            border-radius: 20px;
            outline: none;
            font-size: 14px;
        }
        
        .chat-input:focus {
            border-color: #667eea;
        }
        
        .chat-send {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            cursor: pointer;
            font-size: 18px;
        }
        
        .loading {
            text-align: center;
            padding: 60px 20px;
            color: #667eea;
        }
        
        .spinner {
            border: 5px solid #f3f3f3;
            border-top: 5px solid #667eea;
            border-radius: 50%;
            width: 60px;
            height: 60px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .no-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            color: #6c757d;
            font-size: 60px;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 20px;
            border-radius: 15px;
            border-left: 5px solid #dc3545;
        }
        
        .empty-state {
            text-align: center;
            padding: 80px 20px;
            color: #6c757d;
        }
        
        .empty-state-icon {
            font-size: 80px;
            margin-bottom: 20px;
            opacity: 0.6;
        }
        
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-modal {
            font-size: 36px;
            cursor: pointer;
            color: white;
            background: none;
            border: none;
        }
        
        .gallery-container {
            position: relative;
            background: #000;
        }
        
        .gallery-main-image {
            width: 100%;
            height: 500px;
            object-fit: contain;
            background: #000;
        }
        
        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .gallery-nav-btn {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
        }
        
        .gallery-thumbnails {
            display: flex;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
            background: #f8f9fa;
        }
        
        .gallery-thumbnail {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            border: 3px solid transparent;
        }
        
        .gallery-thumbnail.active {
            border-color: #764ba2;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Smart Apartment Finder</h1>
            <p>Find your perfect rental with AI-powered recommendations</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Search</button>
            <button class="tab" onclick="switchTab('favorites')">❤️ Favorites (<span id="favCount">0</span>)</button>
            <button class="tab" onclick="switchTab('history')">📜 History</button>
        </div>
        
        <!-- Search Tab -->
        <div id="searchTab" class="tab-content active">
            <div class="search-box">
                <input 
                    type="text" 
                    id="queryInput" 
                    placeholder="e.g., Flat near UCL, £1500 budget, 30 min commute, care about safety"
                    onkeypress="if(event.key === 'Enter') searchProperties()"
                >
                <button id="searchBtn" onclick="searchProperties()">Search</button>
            </div>
            
            <div id="loadingDiv" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Searching for the perfect apartments...</p>
            </div>
            
            <div id="resultsDiv"></div>
        </div>
        
        <!-- Favorites Tab -->
        <div id="favoritesTab" class="tab-content">
            <div id="favoritesDiv"></div>
        </div>
        
        <!-- History Tab -->
        <div id="historyTab" class="tab-content">
            <div id="historyDiv"></div>
        </div>
    </div>

    <!-- Image Gallery Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Property Gallery</h2>
                <button class="close-modal" onclick="closeImageModal()">&times;</button>
            </div>
            <div class="gallery-container">
                <img id="galleryMainImage" class="gallery-main-image" src="" alt="Property">
                <div class="gallery-nav">
                    <button class="gallery-nav-btn" onclick="changeImage(-1)">&#10094;</button>
                    <button class="gallery-nav-btn" onclick="changeImage(1)">&#10095;</button>
                </div>
            </div>
            <div style="text-align: center; padding: 10px; background: #f8f9fa;">
                <span id="imageCounter">1 / 1</span>
            </div>
            <div class="gallery-thumbnails" id="galleryThumbnails"></div>
        </div>
    </div>

    <!-- Chat Widget -->
    <div class="chat-widget">
        <button class="chat-toggle" onclick="toggleChat()">💬</button>
        <div class="chat-box" id="chatBox">
            <div class="chat-header">
                <span>🤖 Chat with Alex</span>
                <button class="chat-close" onclick="toggleChat()">×</button>
            </div>
            <div class="chat-messages" id="chatMessages">
                <div class="chat-message ai">
                    <div class="message-bubble">
                        Hi! I'm Alex, your rental assistant. Ask me anything about properties or rental advice!
                    </div>
                </div>
            </div>
            <div class="chat-input-container">
                <input 
                    type="text" 
                    class="chat-input" 
                    id="chatInput" 
                    placeholder="Ask me anything..."
                    onkeypress="if(event.key === 'Enter') sendChatMessage()"
                >
                <button class="chat-send" onclick="sendChatMessage()">➤</button>
            </div>
        </div>
    </div>
    <script>
        let currentResults = [];
        let favorites = new Set();
        let currentGalleryImages = [];
        let currentImageIndex = 0;
        let currentPropertyContext = null;
        
        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'favorites') {
                loadFavorites();
            } else if (tabName === 'history') {
                loadHistory();
            }
        }
        
        // Chat functions
        function toggleChat() {
            const chatBox = document.getElementById('chatBox');
            chatBox.classList.toggle('active');
        }
        
        async function sendChatMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // Add user message to chat
            addChatMessage(message, 'user');
            input.value = '';
            
            // Show typing indicator
            addChatMessage('Thinking...', 'ai', true);
            
            try {
                const response = await fetch('/api/chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        message: message,
                        context: currentPropertyContext ? { property: currentPropertyContext } : {}
                    })
                });
                
                const data = await response.json();
                
                // Remove typing indicator
                const messages = document.getElementById('chatMessages');
                messages.removeChild(messages.lastChild);
                
                if (data.response) {
                    addChatMessage(data.response, 'ai');
                } else {
                    addChatMessage('Sorry, I encountered an error. Please try again.', 'ai');
                }
            } catch (error) {
                const messages = document.getElementById('chatMessages');
                messages.removeChild(messages.lastChild);
                addChatMessage('Connection error. Please check if the server is running.', 'ai');
            }
        }
        
        function addChatMessage(text, sender) {
    const messagesDiv = document.getElementById('chatMessages');
    const messageDiv = document.createElement('div');
    messageDiv.className = `chat-message ${sender}`;
    
    // Create bubble with innerHTML to support HTML formatting
    const bubble = document.createElement('div');
    bubble.className = 'message-bubble';
    bubble.innerHTML = text; // Use innerHTML instead of textContent
    
    messageDiv.appendChild(bubble);
    messagesDiv.appendChild(messageDiv);
    messagesDiv.scrollTop = messagesDiv.scrollHeight;
}
        
        function openChatWithProperty(property) {
            currentPropertyContext = property;
            const chatBox = document.getElementById('chatBox');
            if (!chatBox.classList.contains('active')) {
                toggleChat();
            }
            setTimeout(() => {
                const input = document.getElementById('chatInput');
                input.value = `Tell me more about the property at ${property.address}`;
                input.focus();
            }, 300);
        }
        
        // Search properties
        async function searchProperties() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('Please enter a search query');
                return;
            }
            
            const loadingDiv = document.getElementById('loadingDiv');
            const resultsDiv = document.getElementById('resultsDiv');
            const searchBtn = document.getElementById('searchBtn');
            
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            searchBtn.disabled = true;
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                } else if (data.status === 'clarification_needed') {
                    resultsDiv.innerHTML = `<div class="error">❓ ${data.data.question}</div>`;
                } else if (data.recommendations && data.recommendations.length > 0) {
                    currentResults = data.recommendations;
                    displayResults(data.recommendations);
                } else {
                    resultsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No properties found matching your criteria.</p></div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
            }
        }
        
        // Open Google Maps
        function openGoogleMaps(address) {
            const mapsUrl = `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(address)}`;
            window.open(mapsUrl, '_blank');
        }
        // Display results with enhanced buttons
        function displayResults(recommendations) {
            const resultsDiv = document.getElementById('resultsDiv');
            resultsDiv.innerHTML = recommendations.map(rec => {
                const isFavorited = favorites.has(rec.url);
                const images = rec.images || [];
                const hasImages = images.length > 0;
                
                return `
                    <div class="property-card">
                        <div class="property-image-container" onclick='${hasImages ? `openImageGallery(${JSON.stringify(images)}, "${rec.address.replace(/"/g, '&quot;')}")` : ""}'>
                            ${hasImages ? `
                                <img src="${images[0]}" alt="${rec.address}" class="property-image" 
                                     onerror="this.parentElement.innerHTML='<div class=\\'no-image-placeholder\\'>🏠</div>'">
                                <div class="image-count-badge">
                                    📷 ${images.length} ${images.length === 1 ? 'photo' : 'photos'}
                                </div>
                            ` : `
                                <div class="no-image-placeholder">🏠</div>
                            `}
                        </div>
                        <div class="property-content">
                            <div class="property-header">
                                <span class="rank-badge">Rank ${rec.rank}</span>
                                <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" 
                                        onclick="toggleFavorite('${rec.url.replace(/'/g, "\\\'")}')" 
                                        title="${isFavorited ? 'Remove from favorites' : 'Add to favorites'}">
                                    ${isFavorited ? '❤️' : '🤍'}
                                </button>
                            </div>
                            <div class="property-address">${rec.address}</div>
                            <div class="property-details">
                                <div class="detail-item">
                                    <strong>💰 Price:</strong> ${rec.price}
                                </div>
                                <div class="detail-item">
                                    <strong>⏱️ Travel Time:</strong> ${rec.travel_time}
                                </div>
                            </div>
                            <div class="property-explanation">${rec.explanation}</div>
                            <div class="property-actions">
                                <a href="${rec.url}" target="_blank" class="property-link">
                                    🏢 View Listing
                                </a>
                                <button class="map-btn" onclick='openGoogleMaps("${rec.address.replace(/"/g, '&quot;')}")'>
                                    📍 View Map
                                </button>
                                ${hasImages ? `<button class="view-gallery-btn" onclick='openImageGallery(${JSON.stringify(images)}, "${rec.address.replace(/"/g, '&quot;')}")'>📷 Gallery</button>` : ''}
                                <button class="chat-btn" onclick='openChatWithProperty(${JSON.stringify({address: rec.address, price: rec.price, travel_time: rec.travel_time})})'>
                                    💬 Ask AI
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Image gallery functions
        function openImageGallery(images, address) {
            if (!images || images.length === 0) return;
            
            currentGalleryImages = images;
            currentImageIndex = 0;
            
            document.getElementById('modalTitle').textContent = address;
            document.getElementById('imageModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            updateGalleryImage();
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = currentGalleryImages.length - 1;
            if (currentImageIndex >= currentGalleryImages.length) currentImageIndex = 0;
            updateGalleryImage();
        }
        
        function updateGalleryImage() {
            const mainImage = document.getElementById('galleryMainImage');
            mainImage.src = currentGalleryImages[currentImageIndex];
            
            document.getElementById('imageCounter').textContent = 
                `${currentImageIndex + 1} / ${currentGalleryImages.length}`;
            
            const thumbnailsDiv = document.getElementById('galleryThumbnails');
            thumbnailsDiv.innerHTML = currentGalleryImages.map((img, index) => `
                <img src="${img}" 
                     class="gallery-thumbnail ${index === currentImageIndex ? 'active' : ''}"
                     onclick="currentImageIndex = ${index}; updateGalleryImage()">
            `).join('');
        }
        
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeImageModal();
            }
        }
        
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imageModal');
            if (modal.style.display === 'block') {
                if (event.key === 'ArrowLeft') changeImage(-1);
                if (event.key === 'ArrowRight') changeImage(1);
                if (event.key === 'Escape') closeImageModal();
            }
        });
        
        // Toggle favorite
        async function toggleFavorite(url) {
            const property = currentResults.find(r => r.url === url);
            if (!property) return;
            
            try {
                if (favorites.has(url)) {
                    const response = await fetch(`/api/favorites/${encodeURIComponent(url)}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        favorites.delete(url);
                    }
                } else {
                    const propertyData = {
                        'URL': property.url,
                        'Address': property.address,
                        'Price': property.price,
                        'travel_time_minutes': parseInt(property.travel_time) || 0,
                        'Platform': 'Rightmove',
                        'explanation': property.explanation,
                        'rank': property.rank,
                        'Images': property.images || []
                    };
                    
                    const response = await fetch('/api/favorites', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(propertyData)
                    });
                    
                    if (response.ok) {
                        favorites.add(url);
                    }
                }
                
                updateFavCount();
                displayResults(currentResults);
            } catch (error) {
                console.error('Favorite error:', error);
                alert('Error updating favorites: ' + error.message);
            }
        }
        // Load favorites
        async function loadFavorites() {
            const favoritesDiv = document.getElementById('favoritesDiv');
            favoritesDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('/api/favorites');
                const data = await response.json();
                
                if (data.favorites && data.favorites.length > 0) {
                    favoritesDiv.innerHTML = data.favorites.map((fav, index) => {
                        const images = fav.Images || [];
                        const hasImages = images.length > 0;
                        
                        return `
                            <div class="property-card">
                                <div class="property-image-container" onclick='${hasImages ? `openImageGallery(${JSON.stringify(images)}, "${fav.Address.replace(/"/g, '&quot;')}")` : ""}'>
                                    ${hasImages ? `
                                        <img src="${images[0]}" alt="${fav.Address}" class="property-image"
                                             onerror="this.parentElement.innerHTML='<div class=\\'no-image-placeholder\\'>🏠</div>'">
                                        <div class="image-count-badge">
                                            📷 ${images.length} ${images.length === 1 ? 'photo' : 'photos'}
                                        </div>
                                    ` : `
                                        <div class="no-image-placeholder">🏠</div>
                                    `}
                                </div>
                                <div class="property-content">
                                    <div class="property-header">
                                        <span class="rank-badge">Favorite ${index + 1}</span>
                                        <button class="favorite-btn favorited" 
                                                onclick="removeFavorite('${fav.URL.replace(/'/g, "\\\'")}')" 
                                                title="Remove from favorites">
                                            ❤️
                                        </button>
                                    </div>
                                    <div class="property-address">${fav.Address || 'Unknown Address'}</div>
                                    <div class="property-details">
                                        <div class="detail-item">
                                            <strong>💰 Price:</strong> ${fav.Price || 'N/A'}
                                        </div>
                                        <div class="detail-item">
                                            <strong>⏱️ Travel Time:</strong> ${fav.travel_time_minutes || 'N/A'} min
                                        </div>
                                    </div>
                                    <div class="property-actions">
                                        <a href="${fav.URL}" target="_blank" class="property-link">
                                            🏢 View Listing
                                        </a>
                                        <button class="map-btn" onclick='openGoogleMaps("${fav.Address.replace(/"/g, '&quot;')}")'>
                                            📍 View Map
                                        </button>
                                        ${hasImages ? `<button class="view-gallery-btn" onclick='openImageGallery(${JSON.stringify(images)}, "${fav.Address.replace(/"/g, '&quot;')}")'>📷 Gallery</button>` : ''}
                                        <button class="chat-btn" onclick='openChatWithProperty(${JSON.stringify({address: fav.Address, price: fav.Price, travel_time: (fav.travel_time_minutes || 'N/A') + " min"})})'>
                                            💬 Ask AI
                                        </button>
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    favorites.clear();
                    data.favorites.forEach(fav => favorites.add(fav.URL));
                } else {
                    favoritesDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❤️</div><p>No favorites yet. Add properties from search results!</p></div>';
                }
                
                updateFavCount();
            } catch (error) {
                favoritesDiv.innerHTML = `<div class="error">❌ Error loading favorites: ${error.message}</div>`;
            }
        }
        
        async function removeFavorite(url) {
            try {
                const response = await fetch(`/api/favorites/${encodeURIComponent(url)}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    favorites.delete(url);
                    loadFavorites();
                }
            } catch (error) {
                alert('Error removing favorite: ' + error.message);
            }
        }
        
        // Load history
        async function loadHistory() {
            const historyDiv = document.getElementById('historyDiv');
            historyDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                if (data.history && data.history.length > 0) {
                    historyDiv.innerHTML = data.history.reverse().map((item) => {
                        const date = new Date(item.timestamp).toLocaleString();
                        return `
                            <div style="background: linear-gradient(135deg, #f8f9fa, #e9ecef); border-left: 5px solid #667eea; padding: 20px; margin-bottom: 20px; border-radius: 15px;">
                                <div style="color: #6c757d; font-size: 14px; margin-bottom: 15px;">
                                    🕐 ${date}
                                </div>
                                <div style="font-weight: 600; margin-bottom: 10px;">
                                    <strong>Results Found:</strong> ${item.results_found}
                                </div>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 12px; margin-top: 15px;">
                                    <div style="background: white; padding: 12px; border-radius: 10px;">
                                        <strong>📍 Destination:</strong> ${item.criteria.destination}
                                    </div>
                                    <div style="background: white; padding: 12px; border-radius: 10px;">
                                        <strong>💰 Budget:</strong> £${item.criteria.max_budget}
                                    </div>
                                    <div style="background: white; padding: 12px; border-radius: 10px;">
                                        <strong>⏱️ Max Travel:</strong> ${item.criteria.max_travel_time} min
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    historyDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><p>No search history yet!</p></div>';
                }
            } catch (error) {
                historyDiv.innerHTML = `<div class="error">❌ Error loading history: ${error.message}</div>`;
            }
        }
        
        function updateFavCount() {
            document.getElementById('favCount').textContent = favorites.size;
        }
        
        // Load favorites on page load
        loadFavorites();
    </script>
</body>
</html>
