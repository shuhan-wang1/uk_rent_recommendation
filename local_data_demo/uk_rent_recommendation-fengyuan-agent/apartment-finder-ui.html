<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Apartment Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }
        
        .tabs {
            display: flex;
            background: #f8f9fa;
            border-bottom: 2px solid #dee2e6;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            background: #f8f9fa;
            border: none;
            font-size: 16px;
            font-weight: 600;
            color: #495057;
            transition: all 0.3s;
        }
        
        .tab:hover {
            background: #e9ecef;
        }
        
        .tab.active {
            background: white;
            color: #667eea;
            border-bottom: 3px solid #667eea;
        }
        
        .tab-content {
            display: none;
            padding: 30px;
        }
        
        .tab-content.active {
            display: block;
        }
        
        .search-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        #queryInput {
            flex: 1;
            padding: 15px;
            font-size: 16px;
            border: 2px solid #dee2e6;
            border-radius: 10px;
            outline: none;
            transition: border-color 0.3s;
        }
        
        #queryInput:focus {
            border-color: #667eea;
        }
        
        #searchBtn {
            padding: 15px 40px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        #searchBtn:hover {
            transform: translateY(-2px);
        }
        
        #searchBtn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            color: #667eea;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .property-card {
            background: white;
            border: 2px solid #dee2e6;
            border-radius: 15px;
            overflow: hidden;
            margin-bottom: 20px;
            transition: all 0.3s;
            display: flex;
            flex-direction: column;
        }
        
        .property-card:hover {
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.2);
            transform: translateY(-5px);
        }
        
        .property-image-container {
            position: relative;
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #f0f0f0;
            cursor: pointer;
        }
        
        .property-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.3s;
        }
        
        .property-card:hover .property-image {
            transform: scale(1.05);
        }
        
        .image-count-badge {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        .no-image-placeholder {
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #e9ecef 0%, #dee2e6 100%);
            color: #6c757d;
            font-size: 48px;
        }
        
        .property-content {
            padding: 20px;
        }
        
        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 15px;
        }
        
        .rank-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-weight: bold;
            font-size: 14px;
        }
        
        .favorite-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            transition: transform 0.2s;
        }
        
        .favorite-btn:hover {
            transform: scale(1.2);
        }
        
        .favorite-btn.favorited {
            color: #ff6b6b;
        }
        
        .property-address {
            font-size: 18px;
            font-weight: 600;
            color: #212529;
            margin-bottom: 10px;
        }
        
        .property-details {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .detail-item {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #6c757d;
        }
        
        .detail-item strong {
            color: #495057;
        }
        
        .property-explanation {
            color: #495057;
            line-height: 1.6;
            margin-bottom: 15px;
        }
        
        .property-actions {
            display: flex;
            gap: 10px;
        }
        
        .property-link {
            flex: 1;
            display: inline-block;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            transition: background 0.3s;
            text-align: center;
        }
        
        .property-link:hover {
            background: #764ba2;
        }
        
        .view-gallery-btn {
            padding: 10px 20px;
            background: #28a745;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-size: 14px;
        }
        
        .view-gallery-btn:hover {
            background: #218838;
        }
        
        /* Image Modal */
        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.95);
            animation: fadeIn 0.3s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        
        .modal-content {
            position: relative;
            width: 90%;
            max-width: 1000px;
            margin: 50px auto;
            background: white;
            border-radius: 15px;
            overflow: hidden;
        }
        
        .modal-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .close-modal {
            font-size: 36px;
            cursor: pointer;
            color: white;
            background: none;
            border: none;
            line-height: 1;
        }
        
        .close-modal:hover {
            opacity: 0.7;
        }
        
        .gallery-container {
            position: relative;
            background: #000;
        }
        
        .gallery-main-image {
            width: 100%;
            height: 500px;
            object-fit: contain;
            background: #000;
        }
        
        .gallery-nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            width: 100%;
            display: flex;
            justify-content: space-between;
            padding: 0 20px;
        }
        
        .gallery-nav-btn {
            background: rgba(255, 255, 255, 0.8);
            border: none;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 24px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .gallery-nav-btn:hover {
            background: white;
            transform: scale(1.1);
        }
        
        .gallery-thumbnails {
            display: flex;
            gap: 10px;
            padding: 20px;
            overflow-x: auto;
            background: #f8f9fa;
        }
        
        .gallery-thumbnail {
            width: 100px;
            height: 70px;
            object-fit: cover;
            border-radius: 5px;
            cursor: pointer;
            border: 3px solid transparent;
            transition: all 0.3s;
        }
        
        .gallery-thumbnail:hover {
            border-color: #667eea;
        }
        
        .gallery-thumbnail.active {
            border-color: #764ba2;
        }
        
        .gallery-counter {
            text-align: center;
            padding: 10px;
            background: #f8f9fa;
            color: #495057;
            font-weight: 600;
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid #f5c6cb;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #6c757d;
        }
        
        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
            opacity: 0.5;
        }
        
        .history-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }
        
        .history-date {
            color: #6c757d;
            font-size: 14px;
            margin-bottom: 10px;
        }
        
        .history-criteria {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 10px;
            margin-top: 10px;
        }
        
        .criteria-item {
            background: white;
            padding: 8px;
            border-radius: 5px;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🏠 Smart Apartment Finder</h1>
            <p>Find your perfect rental with AI-powered recommendations</p>
        </div>
        
        <div class="tabs">
            <button class="tab active" onclick="switchTab('search')">🔍 Search</button>
            <button class="tab" onclick="switchTab('favorites')">❤️ Favorites (<span id="favCount">0</span>)</button>
            <button class="tab" onclick="switchTab('history')">📜 History</button>
        </div>
        
        <!-- Search Tab -->
        <div id="searchTab" class="tab-content active">
            <div class="search-box">
                <input 
                    type="text" 
                    id="queryInput" 
                    placeholder="e.g., Flat near UCL, £1500 budget, 30 min commute, care about safety"
                    onkeypress="if(event.key === 'Enter') searchProperties()"
                >
                <button id="searchBtn" onclick="searchProperties()">Search</button>
            </div>
            
            <div id="loadingDiv" class="loading" style="display: none;">
                <div class="spinner"></div>
                <p>Searching for the perfect apartments...</p>
            </div>
            
            <div id="resultsDiv"></div>
        </div>
        
        <!-- Favorites Tab -->
        <div id="favoritesTab" class="tab-content">
            <div id="favoritesDiv"></div>
        </div>
        
        <!-- History Tab -->
        <div id="historyTab" class="tab-content">
            <div id="historyDiv"></div>
        </div>
    </div>

    <!-- Image Gallery Modal -->
    <div id="imageModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Property Gallery</h2>
                <button class="close-modal" onclick="closeImageModal()">&times;</button>
            </div>
            <div class="gallery-container">
                <img id="galleryMainImage" class="gallery-main-image" src="" alt="Property">
                <div class="gallery-nav">
                    <button class="gallery-nav-btn" onclick="changeImage(-1)">&#10094;</button>
                    <button class="gallery-nav-btn" onclick="changeImage(1)">&#10095;</button>
                </div>
            </div>
            <div class="gallery-counter">
                <span id="imageCounter">1 / 1</span>
            </div>
            <div class="gallery-thumbnails" id="galleryThumbnails"></div>
        </div>
    </div>

    <script>
        let currentResults = [];
        let favorites = new Set();
        let currentGalleryImages = [];
        let currentImageIndex = 0;
        
        // Tab switching
        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(content => content.classList.remove('active'));
            
            event.target.classList.add('active');
            document.getElementById(tabName + 'Tab').classList.add('active');
            
            if (tabName === 'favorites') {
                loadFavorites();
            } else if (tabName === 'history') {
                loadHistory();
            }
        }
        
        // Search properties
        async function searchProperties() {
            const query = document.getElementById('queryInput').value.trim();
            if (!query) {
                alert('Please enter a search query');
                return;
            }
            
            const loadingDiv = document.getElementById('loadingDiv');
            const resultsDiv = document.getElementById('resultsDiv');
            const searchBtn = document.getElementById('searchBtn');
            
            loadingDiv.style.display = 'block';
            resultsDiv.innerHTML = '';
            searchBtn.disabled = true;
            
            try {
                const response = await fetch('/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query })
                });
                
                const data = await response.json();
                
                if (data.error) {
                    resultsDiv.innerHTML = `<div class="error">❌ ${data.error}</div>`;
                } else if (data.status === 'clarification_needed') {
                    resultsDiv.innerHTML = `<div class="error">❓ ${data.data.question}</div>`;
                } else if (data.recommendations && data.recommendations.length > 0) {
                    currentResults = data.recommendations;
                    displayResults(data.recommendations);
                } else {
                    resultsDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🔍</div><p>No properties found matching your criteria.</p></div>';
                }
            } catch (error) {
                resultsDiv.innerHTML = `<div class="error">❌ Error: ${error.message}</div>`;
            } finally {
                loadingDiv.style.display = 'none';
                searchBtn.disabled = false;
            }
        }
        
        // Display results with images
        function displayResults(recommendations) {
            const resultsDiv = document.getElementById('resultsDiv');
            resultsDiv.innerHTML = recommendations.map(rec => {
                const isFavorited = favorites.has(rec.url);
                const images = rec.images || [];
                const hasImages = images.length > 0;
                
                return `
                    <div class="property-card">
                        <div class="property-image-container" onclick='${hasImages ? `openImageGallery(${JSON.stringify(images)}, "${rec.address}")` : ""}'>
                            ${hasImages ? `
                                <img src="${images[0]}" alt="${rec.address}" class="property-image" 
                                     onerror="this.parentElement.innerHTML='<div class=\\'no-image-placeholder\\'>🏠</div>'">
                                <div class="image-count-badge">
                                    📷 ${images.length} ${images.length === 1 ? 'photo' : 'photos'}
                                </div>
                            ` : `
                                <div class="no-image-placeholder">🏠</div>
                            `}
                        </div>
                        <div class="property-content">
                            <div class="property-header">
                                <span class="rank-badge">Rank ${rec.rank}</span>
                                <button class="favorite-btn ${isFavorited ? 'favorited' : ''}" 
                                        onclick="toggleFavorite('${rec.url}')" 
                                        title="${isFavorited ? 'Remove from favorites' : 'Add to favorites'}">
                                    ${isFavorited ? '❤️' : '🤍'}
                                </button>
                            </div>
                            <div class="property-address">${rec.address}</div>
                            <div class="property-details">
                                <div class="detail-item">
                                    <strong>💰 Price:</strong> ${rec.price}
                                </div>
                                <div class="detail-item">
                                    <strong>⏱️ Travel Time:</strong> ${rec.travel_time}
                                </div>
                            </div>
                            <div class="property-explanation">${rec.explanation}</div>
                            <div class="property-actions">
                                <a href="${rec.url}" target="_blank" class="property-link">View on Website →</a>
                                ${hasImages ? `<button class="view-gallery-btn" onclick='openImageGallery(${JSON.stringify(images)}, "${rec.address}")'>📷 Gallery</button>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        // Image gallery functions
        function openImageGallery(images, address) {
            if (!images || images.length === 0) return;
            
            currentGalleryImages = images;
            currentImageIndex = 0;
            
            document.getElementById('modalTitle').textContent = address;
            document.getElementById('imageModal').style.display = 'block';
            document.body.style.overflow = 'hidden';
            
            updateGalleryImage();
        }
        
        function closeImageModal() {
            document.getElementById('imageModal').style.display = 'none';
            document.body.style.overflow = 'auto';
        }
        
        function changeImage(direction) {
            currentImageIndex += direction;
            if (currentImageIndex < 0) currentImageIndex = currentGalleryImages.length - 1;
            if (currentImageIndex >= currentGalleryImages.length) currentImageIndex = 0;
            updateGalleryImage();
        }
        
        function updateGalleryImage() {
            const mainImage = document.getElementById('galleryMainImage');
            mainImage.src = currentGalleryImages[currentImageIndex];
            
            document.getElementById('imageCounter').textContent = 
                `${currentImageIndex + 1} / ${currentGalleryImages.length}`;
            
            // Update thumbnails
            const thumbnailsDiv = document.getElementById('galleryThumbnails');
            thumbnailsDiv.innerHTML = currentGalleryImages.map((img, index) => `
                <img src="${img}" 
                     class="gallery-thumbnail ${index === currentImageIndex ? 'active' : ''}"
                     onclick="currentImageIndex = ${index}; updateGalleryImage()">
            `).join('');
        }
        
        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('imageModal');
            if (event.target === modal) {
                closeImageModal();
            }
        }
        
        // Keyboard navigation for gallery
        document.addEventListener('keydown', function(event) {
            const modal = document.getElementById('imageModal');
            if (modal.style.display === 'block') {
                if (event.key === 'ArrowLeft') changeImage(-1);
                if (event.key === 'ArrowRight') changeImage(1);
                if (event.key === 'Escape') closeImageModal();
            }
        });
        
        // Toggle favorite - FIXED VERSION
        async function toggleFavorite(url) {
            const property = currentResults.find(r => r.url === url);
            if (!property) return;
            
            try {
                if (favorites.has(url)) {
                    const response = await fetch(`/api/favorites/${encodeURIComponent(url)}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        favorites.delete(url);
                    }
                } else {
                    const propertyData = {
                        'URL': property.url,
                        'Address': property.address,
                        'Price': property.price,
                        'travel_time_minutes': parseInt(property.travel_time) || 0,
                        'Platform': 'Rightmove',
                        'explanation': property.explanation,
                        'rank': property.rank,
                        'Images': property.images || []
                    };
                    
                    const response = await fetch('/api/favorites', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(propertyData)
                    });
                    
                    if (response.ok) {
                        favorites.add(url);
                    }
                }
                
                updateFavCount();
                displayResults(currentResults);
            } catch (error) {
                console.error('Favorite error:', error);
                alert('Error updating favorites: ' + error.message);
            }
        }
        
        // Load favorites with images
        async function loadFavorites() {
            const favoritesDiv = document.getElementById('favoritesDiv');
            favoritesDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('/api/favorites');
                const data = await response.json();
                
                if (data.favorites && data.favorites.length > 0) {
                    favoritesDiv.innerHTML = data.favorites.map((fav, index) => {
                        const images = fav.Images || [];
                        const hasImages = images.length > 0;
                        
                        return `
                            <div class="property-card">
                                <div class="property-image-container" onclick='${hasImages ? `openImageGallery(${JSON.stringify(images)}, "${fav.Address}")` : ""}'>
                                    ${hasImages ? `
                                        <img src="${images[0]}" alt="${fav.Address}" class="property-image"
                                             onerror="this.parentElement.innerHTML='<div class=\\'no-image-placeholder\\'>🏠</div>'">
                                        <div class="image-count-badge">
                                            📷 ${images.length} ${images.length === 1 ? 'photo' : 'photos'}
                                        </div>
                                    ` : `
                                        <div class="no-image-placeholder">🏠</div>
                                    `}
                                </div>
                                <div class="property-content">
                                    <div class="property-header">
                                        <span class="rank-badge">Favorite ${index + 1}</span>
                                        <button class="favorite-btn favorited" 
                                                onclick="removeFavorite('${fav.URL}')" 
                                                title="Remove from favorites">
                                            ❤️
                                        </button>
                                    </div>
                                    <div class="property-address">${fav.Address || 'Unknown Address'}</div>
                                    <div class="property-details">
                                        <div class="detail-item">
                                            <strong>💰 Price:</strong> ${fav.Price || 'N/A'}
                                        </div>
                                        <div class="detail-item">
                                            <strong>⏱️ Travel Time:</strong> ${fav.travel_time_minutes || 'N/A'} min
                                        </div>
                                        <div class="detail-item">
                                            <strong>🏢 Platform:</strong> ${fav.Platform || 'N/A'}
                                        </div>
                                    </div>
                                    <div class="property-actions">
                                        <a href="${fav.URL}" target="_blank" class="property-link">View on Website →</a>
                                        ${hasImages ? `<button class="view-gallery-btn" onclick='openImageGallery(${JSON.stringify(images)}, "${fav.Address}")'>📷 Gallery</button>` : ''}
                                    </div>
                                </div>
                            </div>
                        `;
                    }).join('');
                    
                    favorites.clear();
                    data.favorites.forEach(fav => favorites.add(fav.URL));
                } else {
                    favoritesDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">❤️</div><p>No favorites yet. Add properties from search results!</p></div>';
                }
                
                updateFavCount();
            } catch (error) {
                favoritesDiv.innerHTML = `<div class="error">❌ Error loading favorites: ${error.message}</div>`;
            }
        }
        
        // Remove favorite
        async function removeFavorite(url) {
            try {
                const response = await fetch(`/api/favorites/${encodeURIComponent(url)}`, {
                    method: 'DELETE'
                });
                if (response.ok) {
                    favorites.delete(url);
                    loadFavorites();
                }
            } catch (error) {
                alert('Error removing favorite: ' + error.message);
            }
        }
        
        // Load history
        async function loadHistory() {
            const historyDiv = document.getElementById('historyDiv');
            historyDiv.innerHTML = '<div class="loading"><div class="spinner"></div></div>';
            
            try {
                const response = await fetch('/api/history');
                const data = await response.json();
                
                if (data.history && data.history.length > 0) {
                    historyDiv.innerHTML = data.history.reverse().map((item, index) => {
                        const date = new Date(item.timestamp).toLocaleString();
                        return `
                            <div class="history-item">
                                <div class="history-date">🕐 ${date}</div>
                                <div><strong>Results Found:</strong> ${item.results_found}</div>
                                <div class="history-criteria">
                                    <div class="criteria-item"><strong>📍 Destination:</strong> ${item.criteria.destination}</div>
                                    <div class="criteria-item"><strong>💰 Budget:</strong> £${item.criteria.max_budget}</div>
                                    <div class="criteria-item"><strong>⏱️ Max Travel:</strong> ${item.criteria.max_travel_time} min</div>
                                    ${item.criteria.soft_preferences ? `<div class="criteria-item"><strong>Preferences:</strong> ${item.criteria.soft_preferences}</div>` : ''}
                                </div>
                            </div>
                        `;
                    }).join('');
                } else {
                    historyDiv.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📜</div><p>No search history yet. Start searching to see your history!</p></div>';
                }
            } catch (error) {
                historyDiv.innerHTML = `<div class="error">❌ Error loading history: ${error.message}</div>`;
            }
        }
        
        // Update favorites count
        function updateFavCount() {
            document.getElementById('favCount').textContent = favorites.size;
        }
        
        // Load favorites on page load
        loadFavorites();
    </script>
</body>
</html>
