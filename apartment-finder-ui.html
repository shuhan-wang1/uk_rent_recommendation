<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Apartment Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .search-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .search-input-wrapper {
            position: relative;
            margin-bottom: 20px;
        }

        /* --- MODIFICATION START --- */
        .search-input {
            width: 100%;
            padding: 18px 140px 18px 20px; /* Adjusted padding for button */
            font-size: 16px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            transition: border-color 0.3s;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            resize: vertical; /* Allow vertical resizing */
            min-height: 60px; /* Set a minimum height */
            line-height: 1.5;
        }
        /* --- MODIFICATION END --- */

        .search-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .search-btn {
            position: absolute;
            right: 5px;
            top: 50%;
            transform: translateY(-50%);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .search-btn:hover {
            transform: translateY(-50%) scale(1.05);
        }

        .quick-filters {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filter-group {
            flex: 1;
            min-width: 200px;
        }

        .filter-group label {
            display: block;
            font-weight: 600;
            margin-bottom: 8px;
            color: #333;
        }

        .filter-group input, .filter-group select {
            width: 100%;
            padding: 10px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 25px;
            background: white;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            transition: all 0.3s;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .tab.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            box-shadow: 0 4px 10px rgba(102, 126, 234, 0.4);
        }

        .content-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            display: none;
        }

        .content-section.active {
            display: block;
        }

        .property-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 25px;
        }

        .property-card {
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            transition: transform 0.3s, box-shadow 0.3s;
            background: white;
        }

        .property-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }

        .property-image {
            width: 100%;
            height: 200px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 48px;
        }

        .property-content {
            padding: 20px;
        }

        .property-price {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
            margin-bottom: 10px;
        }

        .property-address {
            font-size: 16px;
            color: #333;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .property-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 15px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #666;
        }

        .detail-icon {
            font-size: 18px;
        }

        .property-stats {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 15px;
        }

        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 13px;
        }

        .stat-label {
            color: #666;
        }

        .stat-value {
            font-weight: 600;
            color: #333;
        }

        .property-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s;
        }

        .btn:hover {
            transform: scale(1.05);
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-secondary {
            background: #f8f9fa;
            color: #333;
            border: 2px solid #e0e0e0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .recommendation-rank {
            position: absolute;
            top: 10px;
            right: 10px;
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            color: #333;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 18px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }

        .explanation-box {
            background: #f0f7ff;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            margin-top: 15px;
        }

        .explanation-box h4 {
            margin-bottom: 8px;
            color: #667eea;
        }

        .explanation-box p {
            font-size: 14px;
            line-height: 1.6;
            color: #555;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🏠 Smart Apartment Finder</h1>
            <p>Find your perfect London rental with AI-powered recommendations</p>
        </header>

        <div class="search-section">
            <div class="search-input-wrapper">
                <textarea
                    class="search-input"
                    placeholder="Tell me what you're looking for... (e.g., 'Find me a flat near UCL within £1800/month and 30 min commute')"
                    id="searchInput"
                    rows="2"
                ></textarea>
                <button class="search-btn" onclick="performSearch()">Search</button>
            </div>

            <div class="quick-filters">
                <div class="filter-group">
                    <label>Max Budget (£/month)</label>
                    <input type="number" placeholder="e.g., 1800" id="maxBudget">
                </div>
                <div class="filter-group">
                    <label>Max Travel Time (mins)</label>
                    <input type="number" placeholder="e.g., 30" id="maxTravel">
                </div>
                <div class="filter-group">
                    <label>Destination</label>
                    <input type="text" placeholder="e.g., UCL, Gower Street" id="destination">
                </div>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchTab('results')">
                🔍 Search Results
            </button>
            <button class="tab" onclick="switchTab('favorites')">
                ⭐ Favorites (<span id="favCount">0</span>)
            </button>
            <button class="tab" onclick="switchTab('history')">
                📜 Search History
            </button>
        </div>

        <div id="resultsSection" class="content-section active">
            <div class="empty-state">
                <div class="empty-state-icon">🏘️</div>
                <h3>Start Your Search</h3>
                <p>Enter your requirements above to find your perfect apartment</p>
            </div>
        </div>

        <div id="favoritesSection" class="content-section">
             </div>

        <div id="historySection" class="content-section">
             </div>
    </div>

    <script>
        let favorites = [];
        let searchHistory = [];

        function switchTab(tabName) {
            document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
            event.target.classList.add('active');
            document.querySelectorAll('.content-section').forEach(section => section.classList.remove('active'));
            document.getElementById(tabName + 'Section').classList.add('active');

            if (tabName === 'favorites') displayFavorites();
            if (tabName === 'history') displayHistory();
        }

        async function performSearch() {
            const resultsSection = document.getElementById('resultsSection');
            const searchInput = document.getElementById('searchInput').value;
            
            // Show loading spinner
            resultsSection.innerHTML = `
                <div class="loading">
                    <div class="spinner"></div>
                    <p>Analyzing your request and searching properties...</p>
                    <p style="font-size: 14px; color: #999;">This may take a moment...</p>
                </div>
            `;

            try {
                // Send the main text query to the backend
                const response = await fetch('http://127.0.0.1:5001/api/search', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: searchInput }),
                });

                if (!response.ok) {
                    const errData = await response.json();
                    throw new Error(errData.error || `HTTP error! status: ${response.status}`);
                }

                const data = await response.json();
                
                if (data && data.recommendations) {
                    displayResults(data.recommendations);
                } else {
                    displayResults([]);
                }

            } catch (error) {
                console.error("Error during search:", error);
                resultsSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😞</div>
                        <h3>An Error Occurred</h3>
                        <p>${error.message}. Please check the console and make sure the backend server is running.</p>
                    </div>
                `;
            }
        }

        function displayResults(properties) {
            const resultsSection = document.getElementById('resultsSection');
            
            if (!properties || properties.length === 0) {
                resultsSection.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">😞</div>
                        <h3>No Properties Found</h3>
                        <p>Try adjusting your search criteria</p>
                    </div>
                `;
                return;
            }

            resultsSection.innerHTML = `
                <h2 style="margin-bottom: 20px;">Top ${properties.length} Recommendations</h2>
                <div class="property-grid">
                    ${properties.map(prop => createPropertyCard(prop)).join('')}
                </div>
            `;
        }

        function createPropertyCard(property) {
            // --- MODIFICATION: Updated to use property.url ---
            return `
                <div class="property-card">
                    <div class="property-image" style="position: relative;">
                        🏢
                        ${property.rank ? `<div class="recommendation-rank">#${property.rank}</div>` : ''}
                    </div>
                    <div class="property-content">
                        <div class="property-price">${property.price || 'N/A'}</div>
                        <div class="property-address">${property.address || 'N/A'}</div>
                        
                        <div class="property-details">
                            <div class="detail-item">
                                <span class="detail-icon">🚇</span>
                                <span>${property.travel_time || 'N/A'} min commute</span>
                            </div>
                        </div>

                        ${property.explanation ? `
                            <div class="explanation-box">
                                <h4>Why This Property?</h4>
                                <p>${property.explanation}</p>
                            </div>
                        ` : ''}

                        <div class="property-actions">
                            <button class="btn btn-primary" onclick="window.open('${property.url || ''}', '_blank')" ${!property.url ? 'disabled' : ''}>
                                View Details
                            </button>
                            <button class="btn btn-secondary" onclick="addToFavorites(${JSON.stringify(property).replace(/"/g, '&quot;')})">
                                ⭐ Favorite
                            </button>
                        </div>
                    </div>
                </div>
            `;
        }

        function addToFavorites(property) {
            // Use URL or address as a unique key to prevent duplicates
            const key = property.url || property.address;
            if (!favorites.find(fav => (fav.url || fav.address) === key)) {
                favorites.push(property);
                document.getElementById('favCount').textContent = favorites.length;
                alert(`Added "${property.address}" to favorites!`);
            } else {
                alert('This property is already in your favorites!');
            }
        }

        function displayFavorites() {
            // ... (this function can remain the same)
        }

        function displayHistory() {
            // ... (this function can remain the same)
        }
    </script>
</body>
</html>
